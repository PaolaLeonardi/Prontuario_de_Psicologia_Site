<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessões | PsicoProntuário</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="sessoes">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-mark">P</div>
        <div>
          <strong>PsicoProntuário</strong>
          <span>Fluxo clínico</span>
        </div>
      </div>
      <nav class="side-nav">
        <a href="dashboard.html" data-nav>Dashboard</a>
        <a href="pacientes.html" data-nav>Pacientes</a>
        <a href="perfil-paciente.html" data-nav>Perfil do paciente</a>
        <a href="sessoes.html" data-nav>Sessões</a>
        <a href="anamnese.html" data-nav>Anamnese</a>
        <a href="avaliacoes.html" data-nav>Avaliações Psicológicas</a>
        <a href="documentos.html" data-nav>Documentos</a>
        <a href="historico.html" data-nav>Histórico</a>
      </nav>
    </aside>

    <main class="content">
      <header class="page-header">
        <div>
          <p class="eyebrow">Registro de sessões</p>
          <h1>Sessões</h1>
        </div>
        <div class="user-bar">
          <span id="user-badge">Usuário</span>
          <button id="logout-button" class="btn btn-secondary" type="button">Sair</button>
        </div>
      </header>

      <section class="card">
        <p id="patient-summary"></p>
        <form id="session-form" class="stack-form">
          <div class="field-row">
            <label>Data</label>
            <input id="session-date" type="date" required />
          </div>
          <div class="field-row">
            <label>Resumo da sessão</label>
            <textarea id="session-summary" rows="4" placeholder="Descreva o andamento da sessão"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Registrar sessão</button>
        </form>
      </section>

      <section class="card">
        <h2>Histórico de sessões</h2>
        <div id="session-list" class="list-stack"></div>
      </section>
    </main>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
